x-drone-env: &drone-env
  DRONE_APP_USERNAME: admin
  DRONE_APP_PASSWORD: changeme
  OVERMIND_URL: https://bff-overmind:8000
  OVERMIND_EMAIL: "${OVERMIND_EMAIL:-}"
  OVERMIND_AUTH_TOKEN: "${OVERMIND_AUTH_TOKEN:-}"
  OVERMIND_DRONE_TOKEN: "${OVERMIND_DRONE_TOKEN:-}"
  USE_FAKE_DATA: "${USE_FAKE_DATA:-false}"
  OVERMIND_POLL_SECONDS: "${DRONE_HEARTBEAT_SECONDS:-60}"
  OVERMIND_SPEED_SAMPLE_SECONDS: "${OVERMIND_SPEED_SAMPLE_SECONDS:-300}"
  PEER_CHECK_INTERVAL_SECONDS: "${PEER_CHECK_INTERVAL_SECONDS:-120}"
  DRONE_SYSTEM_INFO_REFRESH_SECONDS: "${DRONE_SYSTEM_INFO_REFRESH_SECONDS:-1800}"
  DRONE_MTLS_ENABLED: "${DRONE_MTLS_ENABLED:-true}"
  DRONE_MTLS_MODE: managed
  DRONE_MTLS_CA_FILE: /userdata/system/drone-app/certs/ca.crt
  DRONE_CERT_FILE: /userdata/system/drone-app/certs/drone.crt
  DRONE_KEY_FILE: /userdata/system/drone-app/certs/drone.key
  TLS_CERT_FILE: /userdata/system/drone-app/certs/drone.crt
  TLS_KEY_FILE: /userdata/system/drone-app/certs/drone.key
  DRONE_MANAGED_CERT_SOURCE_DIR: /managed-certs
  BATOCERA_TEST_DATA_ROOT: /batocera-test-data
  ROM_SOURCE_ROOT: /batocera-test-data/roms
  HTTPS_PORT: 8443
  DRONE_ROM_MIN: 4
  DRONE_ROM_MAX: 10
  DRONE_SKIP_ROM_SEED: "true"

x-drone-common: &drone-common
  image: ghcr.io/batocera-fleet-federation/batocera-drone:local
  build:
    context: ../../batocera.drone
  depends_on:
    overmind:
      condition: service_healthy
  environment:
    <<: *drone-env
  env_file:
    - ${SWARM_CONTAINER_ENV_FILE:-../scripts/.env.swarm}
  volumes:
    - ../data:/batocera-test-data:ro
  deploy:
    resources:
      limits:
        cpus: "0.50"
        memory: 384M

services:
  postgres:
    image: "${POSTGRES_IMAGE:-postgres:16-alpine}"
    container_name: "${POSTGRES_CONTAINER_NAME:-bff-postgres}"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-overmind}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-overmind}"
      POSTGRES_DB: "${POSTGRES_DB:-overmind}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-overmind} -d ${POSTGRES_DB:-overmind}"]
      interval: 5s
      timeout: 5s
      retries: 20

  overmind:
    image: ghcr.io/batocera-fleet-federation/batocera-overmind:local
    build:
      context: ../../batocera.overmind
    env_file:
      - ${SWARM_CONTAINER_ENV_FILE:-../scripts/.env.swarm}
    environment:
      USE_FAKE_DATA: "${USE_FAKE_DATA:-false}"
      OVERMIND_DATABASE_URL: "${OVERMIND_DATABASE_URL:-postgresql://overmind:overmind@postgres:5432/overmind}"
      SWARM_OFFLINE_THRESHOLD_SECONDS: "180"
      OVERMIND_VERSION: "${OVERMIND_VERSION:-}"
    ports:
      - "${OVERMIND_PORT:-8000}:8000"
    networks:
      default:
        aliases:
          - bff-overmind
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 12

  drone-a:
    <<: *drone-common
    container_name: bff-drone-a
    hostname: drone-a
    mac_address: "02:42:ac:11:00:11"
    environment:
      <<: *drone-env
      DRONE_DEVICE_ID: bff-drone-a
      HOSTNAME_OVERRIDE: bff-drone-a
      DRONE_PUBLIC_IP_OVERRIDE: bff-drone-a
      DRONE_ADVERTISED_API_PORT: 8443
    volumes:
      - ../data:/batocera-test-data:ro
      - drone-a-data:/userdata
      - ../generated/drone-a/userdata/roms:/userdata/roms
      - ../local-certs/drones/drone-a:/managed-certs:ro
    ports:
      - "${DRONE_A_PORT:-8443}:8443"
    networks:
      default:
        aliases:
          - bff-drone-a

  drone-b:
    <<: *drone-common
    container_name: bff-drone-b
    hostname: drone-b
    mac_address: "02:42:ac:11:00:12"
    environment:
      <<: *drone-env
      DRONE_DEVICE_ID: bff-drone-b
      HOSTNAME_OVERRIDE: bff-drone-b
      DRONE_PUBLIC_IP_OVERRIDE: bff-drone-b
      DRONE_ADVERTISED_API_PORT: 8444
      DRONE_COMPAT_HTTPS_PORTS: 8444
    volumes:
      - ../data:/batocera-test-data:ro
      - drone-b-data:/userdata
      - ../generated/drone-b/userdata/roms:/userdata/roms
      - ../local-certs/drones/drone-b:/managed-certs:ro
    ports:
      - "${DRONE_B_PORT:-8444}:8443"
    networks:
      default:
        aliases:
          - bff-drone-b

  drone-c:
    <<: *drone-common
    container_name: bff-drone-c
    hostname: drone-c
    mac_address: "02:42:ac:11:00:13"
    environment:
      <<: *drone-env
      DRONE_DEVICE_ID: bff-drone-c
      HOSTNAME_OVERRIDE: bff-drone-c
      DRONE_PUBLIC_IP_OVERRIDE: bff-drone-c
      DRONE_ADVERTISED_API_PORT: 8445
      DRONE_COMPAT_HTTPS_PORTS: 8445
    volumes:
      - ../data:/batocera-test-data:ro
      - drone-c-data:/userdata
      - ../generated/drone-c/userdata/roms:/userdata/roms
      - ../local-certs/drones/drone-c:/managed-certs:ro
    ports:
      - "${DRONE_C_PORT:-8445}:8443"
    networks:
      default:
        aliases:
          - bff-drone-c

  drone-d:
    <<: *drone-common
    container_name: bff-drone-d
    hostname: drone-d
    mac_address: "02:42:ac:11:00:14"
    environment:
      <<: *drone-env
      DRONE_DEVICE_ID: bff-drone-d
      HOSTNAME_OVERRIDE: bff-drone-d
      DRONE_PUBLIC_IP_OVERRIDE: bff-drone-d
      DRONE_ADVERTISED_API_PORT: 8446
      DRONE_COMPAT_HTTPS_PORTS: 8446
    volumes:
      - ../data:/batocera-test-data:ro
      - drone-d-data:/userdata
      - ../generated/drone-d/userdata/roms:/userdata/roms
      - ../local-certs/drones/drone-d:/managed-certs:ro
    ports:
      - "${DRONE_D_PORT:-8446}:8443"
    networks:
      default:
        aliases:
          - bff-drone-d

volumes:
  postgres-data:
  drone-a-data:
  drone-b-data:
  drone-c-data:
  drone-d-data:
